server:
  port: 8080

spring:
  application:
    name: rag-demo

# RAG 配置
rag:
  chunking:
    chunk-size: 512
    chunk-overlap: 64
    min-chunk-size: 100
    max-chunk-size: 1024
    default-strategy: STRUCTURE_AWARE
    inject-title-path: true
    title-path-separator: " > "
    semantic-threshold: 0.5

  embedding:
    model-name: text-embedding-v4
    dimension: 1024
    api-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    batch-size: 10
    timeout-seconds: 30
    max-retries: 3
    retry-delay-ms: 1000
    retry-backoff-multiplier: 2.0

  milvus:
    enabled: false
    uri: http://127.0.0.1:19530
    username: ""
    password: ""
    db-name: default
    collection-name: rag_vectors
    max-id-length: 256
    max-metadata-length: 8192
    index-type: HNSW
    metric-type: COSINE
    hnsw-m: 16
    hnsw-ef-construction: 256
    search-ef: 128
    consistency-level: EVENTUALLY
