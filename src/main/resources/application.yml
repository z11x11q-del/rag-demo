server:
  port: 8080

spring:
  application:
    name: rag-demo

# RAG 配置
rag:
  chunking:
    chunk-size: 512
    chunk-overlap: 64
    min-chunk-size: 100
    max-chunk-size: 1024
    default-strategy: STRUCTURE_AWARE
    inject-title-path: true
    title-path-separator: " > "
    semantic-threshold: 0.5

  embedding:
    model-name: text-embedding-v4
    dimension: 1024
    api-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${DASHSCOPE_API_KEY:}
    batch-size: 10
    timeout-seconds: 30
    max-retries: 3
    retry-delay-ms: 1000
    retry-backoff-multiplier: 2.0

  elasticsearch:
    enabled: false
    uri: http://127.0.0.1:9200
    username: ""
    password: ""
    index-name: rag_bm25
    number-of-shards: 1
    number-of-replicas: 0
    connect-timeout-ms: 5000
    socket-timeout-ms: 30000

  milvus:
    enabled: false
    uri: http://127.0.0.1:19530
    username: ""
    password: ""
    db-name: default
    collection-name: rag_vectors
    max-id-length: 256
    max-metadata-length: 8192
    index-type: HNSW
    metric-type: COSINE
    hnsw-m: 16
    hnsw-ef-construction: 256
    search-ef: 128
    consistency-level: EVENTUALLY

  retrieval:
    dense-enabled: true              # 启用稠密向量召回通道
    sparse-enabled: true             # 启用 BM25 稀疏召回通道
    rrf-k: 60                        # RRF 平滑常数（经验值，无需调整）
    default-top-k: 10                # 每通道默认 topK
    score-threshold: 0.0             # 融合后最低分数阈值（0.0 = 不过滤）

  query:
    rewrite-enabled: true            # 是否启用 LLM 改写
    intent-recognition-enabled: true  # 是否启用 LLM 意图识别
    max-query-length: 2000           # rawQuery 最大允许长度，超出则截断
    cache-enabled: false             # 是否缓存预处理结果
    cache-ttl-minutes: 30            # 缓存 TTL
    cache-max-size: 10000            # 缓存最大条数

  llm:
    # 激活条件：api-key 有尚即注册真实 Bean，空尚时由 StubBeanConfig 占位
    model-name: LongCat-Flash-Lite                       # 模型名称
    api-base-url: https://api.longcat.chat/openai/v1     # API 地址（切换提供商时修改此项）
    api-key: ${LLM_API_KEY:}                             # API Key（建议通过环境变量注入）
    temperature: 1.0                                     # 生成温度
    max-tokens: 1000                                     # 最大生成 token 数
    timeout-seconds: 60                                  # 单次请求超时
    max-retries: 3                                       # 最大重试次数
    retry-delay-ms: 1000                                 # 重试初始间隔
    retry-backoff-multiplier: 2.0                        # 退空倍数
    # --- 切换至 DashScope 示例 ---
    # model-name: qwen-plus
    # api-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # api-key: ${DASHSCOPE_API_KEY:}
